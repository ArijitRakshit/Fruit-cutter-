<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Fruit Cutter Pro Fix</title>
  <style>
    body { margin:0; overflow:hidden; background:#3e2723; background-image: url('https://images.unsplash.com/photo-1550684376-efcbd6e3f031?q=80&w=1080&auto=format&fit=crop'); background-size: cover; font-family: sans-serif; touch-action: none; }
    canvas { display:block; }
    #ui { position:absolute; top:15px; left:15px; background: rgba(62, 39, 35, 0.9); border: 2px solid #8d6e63; border-radius: 10px; padding: 10px; color:#ffcc80; font-size:18px; z-index:2; }
    #menu, #overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; flex-direction:column; color:white; background:rgba(0,0,0,0.8); z-index:3; }
    button { padding:12px 25px; border-radius:10px; font-size:20px; cursor:pointer; background: #8d6e63; color: white; border:none; }
  </style>
</head>
<body>
  <div id="ui">⏳ TIME: <span id="time">60</span><br>⭐ SCORE: <span id="score">0</span></div>
  <div id="menu"><h1>🍉 Fruit Cutter</h1><button onclick="startGame()">▶ Start Game</button></div>
  <div id="overlay" style="display:none"></div>
  <canvas id="game"></canvas>
<script>
const bgMusic = new Audio('background.mp3'); const cutSound = new Audio('cutting.wav'); const boomSound = new Audio('boom.wav');
const canvas = document.getElementById('game'); const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;

let score=0, timeLeft=60, items=[], splatters=[], gameRunning=false, mouse={x:0,y:0};
const fruits=['🍎','🍉','🍓','🥭','🍍',' kiwi'];

function startGame(){
  document.getElementById('menu').style.display='none'; document.getElementById('overlay').style.display='none';
  score=0; timeLeft=60; items=[]; splatters=[]; gameRunning=true; bgMusic.play().catch(e=>{});
  setInterval(()=>{ if(gameRunning) {timeLeft--; document.getElementById('time').textContent=timeLeft; if(timeLeft<=0) gameOver();} }, 1000);
}

function gameOver(){ gameRunning=false; bgMusic.pause(); document.getElementById('overlay').style.display='flex'; document.getElementById('overlay').innerHTML=`<h1>Game Over</h1><button onclick="location.reload()">🔁 Restart</button>`; }

function handleMove(e){
  if(!gameRunning) return; e.preventDefault();
  mouse.x = e.touches ? e.touches[0].clientX : e.clientX; mouse.y = e.touches ? e.touches[0].clientY : e.clientY;
  items.forEach((it,i)=>{ if(Math.hypot(it.x-mouse.x, it.y-mouse.y) < 40){ 
    if(it.bomb) return gameOver(); cutSound.currentTime=0; cutSound.play();
    splatters.push({x:it.x, y:it.y, life:50}); items.splice(i,1); score+=10; document.getElementById('score').textContent=score;
  }});
}
canvas.addEventListener('touchmove', handleMove); canvas.addEventListener('mousemove', handleMove);

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(gameRunning){
    splatters.forEach((s,i)=>{ ctx.fillStyle='rgba(255,0,0,0.5)'; ctx.beginPath(); ctx.arc(s.x,s.y,20,0,Math.PI*2); ctx.fill(); s.life--; if(s.life<=0) splatters.splice(i,1); });
    if(Math.random()<0.03) items.push({x:Math.random()*canvas.width, y:canvas.height+50, vy:-10-Math.random()*5, icon:fruits[Math.floor(Math.random()*fruits.length)], bomb:Math.random()<0.1});
    items.forEach((it,i)=>{ it.y+=it.vy; it.vy+=0.2; ctx.font='50px Arial'; ctx.fillText(it.bomb?'💣':it.icon, it.x, it.y); if(it.y>canvas.height+100) items.splice(i,1); });
    ctx.font='40px Arial'; ctx.fillText('🔪', mouse.x, mouse.y);
  }
  requestAnimationFrame(animate);
}
animate();
</script></body></html>
